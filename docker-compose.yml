services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dice
      POSTGRES_USER: dice
      POSTGRES_PASSWORD: dice

    ports:
      - "5432:5432"

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    image: kornelmk/dice-roller-backend:latest

    environment:
      APP_VERSION: 1.0.0

    depends_on:
      - db

    ports:
      - "8000:8000"

    restart: unless-stopped

  frontend:
    image: kornelmk/dice-roller-frontend:latest

    depends_on:
      - backend

    ports:
      - "8501:8501"

    restart: unless-stopped