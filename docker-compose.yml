services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dice
      POSTGRES_USER: dice
      POSTGRES_PASSWORD: dice

    ports:
      - "5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dice -d dice"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: kornelmk/dice-roller-backend:latest

    environment:
      APP_VERSION: 1.0.0

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    restart: unless-stopped

  frontend:
    image: kornelmk/dice-roller-frontend:latest

    depends_on:
      - backend

    ports:
      - "8501:8501"

    restart: unless-stopped

volumes:
  db_data: