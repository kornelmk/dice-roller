services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dice
      POSTGRES_USER: dice
      POSTGRES_PASSWORD: dice

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend

    environment:
      APP_VERSION: 1.0.0

    depends_on:
      - db

    ports:
      - "8000:8000"

  frontend:
    build: ./frontend

    depends_on:
      - backend

    ports:
      - "8501:8501"