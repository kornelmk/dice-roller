name: CI-CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - "frontend/**"
      - "database/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-cd.yml"
      - ".github/dependabot.yml"

jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/backend" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check Python syntax
        run: python -m py_compile app/*.py tests/*.py

      - name: Run backend tests
        run: pytest -v

  frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m py_compile app.py

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-test

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          echo "image_tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        run: |
          BACKEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-backend:${{ steps.meta.outputs.image_tag }}"

          docker build \
            -t "$BACKEND_IMAGE" \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-backend:latest" \
            ./backend

          docker push "$BACKEND_IMAGE"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-backend:latest"

      - name: Build and push frontend
        run: |
          FRONTEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-frontend:${{ steps.meta.outputs.image_tag }}"

          docker build \
            -t "$FRONTEND_IMAGE" \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-frontend:latest" \
            ./frontend

          docker push "$FRONTEND_IMAGE"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-frontend:latest"

  docker-scout:
    runs-on: ubuntu-latest
    needs: docker-build-and-push

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-backend:${{ needs.docker-build-and-push.outputs.image_tag }}

      - name: Scan backend CVEs
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-backend:${{ needs.docker-build-and-push.outputs.image_tag }}

      - name: Backend image recommendations
        uses: docker/scout-action@v1
        with:
          command: recommendations
          image: ${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-backend:${{ needs.docker-build-and-push.outputs.image_tag }}

      - name: Frontend image quickview
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-frontend:${{ needs.docker-build-and-push.outputs.image_tag }}

      - name: Scan frontend CVEs
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-frontend:${{ needs.docker-build-and-push.outputs.image_tag }}

      - name: Frontend image recommendations
        uses: docker/scout-action@v1
        with:
          command: recommendations
          image: ${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-frontend:${{ needs.docker-build-and-push.outputs.image_tag }}

  smoke-test:
    runs-on: ubuntu-latest
    needs:
      - docker-build-and-push
      - docker-scout

    steps:
      - name: Debug output
        run: |
          echo "Image tag: ${{ needs.docker-build-and-push.outputs.image_tag }}"

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull backend image
        run: |
          BACKEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-backend:${{ needs.docker-build-and-push.outputs.image_tag }}"
          docker pull "$BACKEND_IMAGE"

      - name: Run backend container
        run: |
          BACKEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-backend:${{ needs.docker-build-and-push.outputs.image_tag }}"

          docker run -d \
            --name dice-roller-backend \
            -p 8000:8000 \
            "$BACKEND_IMAGE"

      - name: Wait for backend
        run: |
          for i in {1..40}; do
            curl --fail http://localhost:8000/health && exit 0
            sleep 2
          done

          docker logs dice-roller-backend
          exit 1

  deploy:
    runs-on: ubuntu-latest
    needs:
      - smoke-test
      - docker-build-and-push

    steps:
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_KEY: ${{ secrets.EC2_SSH_KEY }}
          VERSION: ${{ needs.docker-build-and-push.outputs.image_tag }}
        run: |
          echo "$EC2_KEY" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$EC2_HOST << EOF
            set -e

            cd /home/ec2-user/app

            if [ ! -d .git ]; then
              git clone https://github.com/kornelmk/dice-roller.git .
            else
              git pull
            fi

            echo "APP_VERSION=$VERSION" > .env

            # run docker-compose
            cd infra
            docker-compose pull || true
            docker-compose up -d
          EOF

          rm -f key.pem

  tag-release:
    runs-on: ubuntu-latest
    needs:
      - deploy
      - docker-build-and-push

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Git tag
        env:
          VERSION: ${{ needs.docker-build-and-push.outputs.image_tag }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.docker-build-and-push.outputs.image_tag }}
          name: Release ${{ needs.docker-build-and-push.outputs.image_tag }}
          generate_release_notes: true
