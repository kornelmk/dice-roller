name: CI-CD

on:
  push:
    branches:
      - main
      - develop

jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/backend" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check Python syntax
        run: python -m py_compile app/*.py tests/*.py

      - name: Run backend tests
        run: pytest -v

  frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m py_compile app.py

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-test

    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-backend:build-${{ github.run_number }} ./backend

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-frontend:build-${{ github.run_number }} ./frontend

      - name: Save image names
        id: meta
        run: |
          echo "backend_image=${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-backend:build-${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "frontend_image=${{ secrets.DOCKERHUB_USERNAME }}/dice-roller-frontend:build-${{ github.run_number }}" >> $GITHUB_OUTPUT
          
  docker-push:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push backend image
        run: |
          docker push ${{ needs['docker-build'].outputs.backend_image }}

      - name: Push frontend image
        run: |
          docker push ${{ needs['docker-build'].outputs.frontend_image }}

  smoke-test:
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - docker-push

    steps:
      - name: Run backend container
        run: |
          docker run -d -p 8000:8000 \
          ${{ needs['docker-build'].outputs.backend_image }}

      - name: Wait for backend
        run: |
          for i in {1..40}; do
            curl --fail http://localhost:8000/health && exit 0
            sleep 2
          done
          exit 1

  tag-release:
    runs-on: ubuntu-latest
    needs: smoke-test

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION=v1.0.${{ github.run_number }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $VERSION
          git push origin $VERSION

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          generate_release_notes: true